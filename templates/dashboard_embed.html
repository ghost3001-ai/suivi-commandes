<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard embeddable</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f8f9fc;
            color: #172033;
        }

        .embed-wrap {
            padding: 1rem;
        }

        .embed-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .embed-card {
            background: #fff;
            border-radius: 14px;
            padding: 1rem;
            box-shadow: 0 10px 30px rgba(17, 24, 39, 0.06);
        }

        .embed-kpi small {
            display: block;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .embed-kpi strong {
            display: block;
            margin-top: 0.5rem;
            font-size: 1.5rem;
        }

        .embed-chart {
            min-height: 280px;
        }

        .embed-chart canvas {
            height: 280px !important;
        }

        @media (max-width: 900px) {
            .embed-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 560px) {
            .embed-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="embed-wrap">
        <div class="embed-grid">
            <div class="embed-card embed-kpi">
                <small>CA net</small>
                <strong>{{ "{:,.0f}".format(chiffre_affaires_net or 0) }} FCFA</strong>
            </div>
            <div class="embed-card embed-kpi">
                <small>Ventes</small>
                <strong>{{ total_ventes }}</strong>
            </div>
            <div class="embed-card embed-kpi">
                <small>Encaissements</small>
                <strong>{{ "{:,.0f}".format(total_encaisse or 0) }} FCFA</strong>
            </div>
            <div class="embed-card embed-kpi">
                <small>Stock faible</small>
                <strong>{{ nb_stock_faible }}</strong>
            </div>
        </div>

        <div class="embed-grid" style="grid-template-columns: repeat(2, minmax(0, 1fr));">
            <div class="embed-card embed-chart">
                <canvas id="embedSalesEvolution"></canvas>
            </div>
            <div class="embed-card embed-chart">
                <canvas id="embedSalesChannels"></canvas>
            </div>
        </div>
    </div>

    <script>
    new Chart(document.getElementById('embedSalesEvolution').getContext('2d'), {
        type: 'line',
        data: {
            labels: {{ evolution | map(attribute='mois') | list | tojson }},
            datasets: [{
                label: 'CA ventes',
                data: {{ evolution | map(attribute='total') | list | tojson }},
                borderColor: '#dc3545',
                backgroundColor: 'rgba(220, 53, 69, 0.10)',
                fill: true,
                tension: 0.3,
            }],
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
        },
    });

    new Chart(document.getElementById('embedSalesChannels').getContext('2d'), {
        type: 'bar',
        data: {
            labels: {{ ventes_par_canal | map(attribute='canal') | list | tojson }},
            datasets: [{
                label: 'CA par canal',
                data: {{ ventes_par_canal | map(attribute='chiffre_affaires') | list | tojson }},
                backgroundColor: ['#2c3e6d', '#198754', '#fd7e14'],
                borderRadius: 8,
            }],
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
        },
    });
    </script>
</body>
</html>
