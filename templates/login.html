{% extends "base.html" %}

{% block title %}Connexion{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-white text-center border-0 pt-4">
                <h3 class="mb-0">
                    <i class="bi bi-box-seam text-primary"></i> Suivi Commandes
                </h3>
                <p class="text-muted mt-2">Connectez-vous à votre compte</p>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="bi bi-person"></i> Nom d'utilisateur
                        </label>
                        <input type="text" name="username" class="form-control form-control-lg" 
                               placeholder="admin" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="bi bi-lock"></i> Mot de passe
                        </label>
                        <input type="password" name="password" class="form-control form-control-lg" 
                               placeholder="••••••" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right"></i> Se connecter
                        </button>
                    </div>
                </form>
                <hr class="my-4">
                <div class="text-center text-muted small">
                    <p>Compte par défaut: <strong>admin</strong> / <strong>admin123</strong></p>
                    <p class="mb-0">© 2024 - Application de suivi des commandes</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
