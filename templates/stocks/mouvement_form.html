{% extends "base.html" %}

{% block title %}Nouveau mouvement{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
    <h1 class="h2"><i class="bi bi-plus-circle"></i> Nouveau mouvement</h1>
    <a href="{{ url_for('mouvements_stock') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Retour
    </a>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Produit *</label>
                    <select name="produit_id" class="form-select" required>
                        <option value="">Sélectionner</option>
                        {% for produit in produits %}
                        <option value="{{ produit.id }}">{{ produit.nom }} (stock: {{ "{:,.2f}".format(produit.stock_actuel or 0) }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Type de mouvement *</label>
                    <select name="type_mouvement" id="type_mouvement" class="form-select" required>
                        <option value="ENTREE">Entrée</option>
                        <option value="SORTIE">Sortie</option>
                        <option value="AJUSTEMENT">Ajustement</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Quantité *</label>
                    <input type="number" step="0.01" name="quantite" class="form-control" required>
                    <small class="text-muted" id="quantite-help">Saisir une quantité positive.</small>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Motif</label>
                    <input type="text" name="motif" class="form-control" placeholder="Réception, correction, perte...">
                </div>
            </div>

            <button type="submit" class="btn btn-primary">
                <i class="bi bi-save"></i> Enregistrer
            </button>
            <a href="{{ url_for('mouvements_stock') }}" class="btn btn-secondary">Annuler</a>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const typeMouvement = document.getElementById('type_mouvement');
    const help = document.getElementById('quantite-help');

    function refreshHelp() {
        if (typeMouvement.value === 'AJUSTEMENT') {
            help.textContent = 'Pour un ajustement: positif ajoute du stock, négatif retire du stock.';
        } else if (typeMouvement.value === 'SORTIE') {
            help.textContent = 'Saisir une quantité positive, elle sera déduite du stock.';
        } else {
            help.textContent = 'Saisir une quantité positive.';
        }
    }

    typeMouvement.addEventListener('change', refreshHelp);
    refreshHelp();
</script>
{% endblock %}
