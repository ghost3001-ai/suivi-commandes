{% extends "base.html" %}

{% block title %}{{ titre }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
    <h1 class="h2">
        <i class="bi bi-{% if commande %}pencil-square{% else %}plus-circle{% endif %}"></i> {{ titre }}
    </h1>
    <a href="{{ url_for('commandes') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Retour
    </a>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row">
                <div class="col-md-2 mb-3">
                    <label class="form-label">Nr.</label>
                    <input type="number" name="nr" class="form-control" value="{{ commande.nr if commande else '' }}">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Date commande *</label>
                    <input type="date" name="date_cde" class="form-control" 
                           value="{{ commande.date_cde.strftime('%Y-%m-%d') if commande and commande.date_cde else '' }}">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Entité *</label>
                    <select name="entite" class="form-select" required>
                        <option value="">Sélectionner</option>
                        <option value="AFRILUX" {% if commande and commande.entite == 'AFRILUX' %}selected{% endif %}>AFRILUX</option>
                        <option value="SMART" {% if commande and commande.entite == 'SMART' %}selected{% endif %}>SMART</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Acheteur</label>
                    <select name="acheteur" class="form-select">
                        <option value="">Sélectionner</option>
                        <option value="GILLES" {% if commande and commande.acheteur == 'GILLES' %}selected{% endif %}>GILLES</option>
                        <option value="JISLAIN" {% if commande and commande.acheteur == 'JISLAIN' %}selected{% endif %}>JISLAIN</option>
                        <option value="ALAIN" {% if commande and commande.acheteur == 'ALAIN' %}selected{% endif %}>ALAIN</option>
                    </select>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Demandeur</label>
                    <input type="text" name="demandeur" class="form-control" value="{{ commande.demandeur if commande else '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Service demandeur</label>
                    <input type="text" name="service_demandeur" class="form-control" value="{{ commande.service_demandeur if commande else '' }}">
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Fournisseur</label>
                    <select name="fournisseur_id" class="form-select">
                        <option value="">Sélectionner</option>
                        {% for f in fournisseurs %}
                        <option value="{{ f.id }}" {% if commande and commande.fournisseur_id == f.id %}selected{% endif %}>{{ f.nom }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">N° Bon commande</label>
                    <input type="text" name="bon_commande" class="form-control" value="{{ commande.bon_commande if commande else '' }}">
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Affaire / Description</label>
                <textarea name="affaire" class="form-control" rows="2">{{ commande.affaire if commande else '' }}</textarea>
            </div>
            
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Montant (FCFA)</label>
                    <input type="number" step="0.01" name="montant" class="form-control" value="{{ commande.montant if commande else 0 }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Avance (FCFA)</label>
                    <input type="number" step="0.01" name="avance" class="form-control" value="{{ commande.avance if commande else 0 }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Date paiement</label>
                    <input type="date" name="date_paiement" class="form-control" 
                           value="{{ commande.date_paiement.strftime('%Y-%m-%d') if commande and commande.date_paiement else '' }}">
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Date livraison</label>
                    <input type="date" name="date_livraison" class="form-control" 
                           value="{{ commande.date_livraison.strftime('%Y-%m-%d') if commande and commande.date_livraison else '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">N° Bon livraison</label>
                    <input type="text" name="bon_livraison" class="form-control" value="{{ commande.bon_livraison if commande else '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">N° Facture</label>
                    <input type="text" name="facture" class="form-control" value="{{ commande.facture if commande else '' }}">
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Commentaire</label>
                <textarea name="commentaire" class="form-control" rows="2">{{ commande.commentaire if commande else '' }}</textarea>
            </div>
            
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Enregistrer
                </button>
                <a href="{{ url_for('commandes') }}" class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> Annuler
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
