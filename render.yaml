services:
  - type: web
    name: suivi-commandes
    runtime: python
    branch: main
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python init_app.py && gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 4 --worker-class sync --access-logfile - --error-logfile -
    healthCheckPath: /healthz
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: suivi-commandes-db
          property: connectionString

databases:
  - name: suivi-commandes-db
    plan: free
    region: frankfurt
